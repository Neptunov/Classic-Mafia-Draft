name: Compile Standalone Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Executables
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86] 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (${{ matrix.arch }})
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.arch }} 

      - name: Build React Client
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Package Executable (Windows ${{ matrix.arch }})
        shell: bash
        run: |
          npx caxa --input . --output ClassicMafiaDraft-Win${{ matrix.arch == 'x64' && '64' || '86' }}.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/server/index.js" CAXA_BUILD
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassicMafiaDraft-Win${{ matrix.arch == 'x64' && '64' || '86' }}
          path: ClassicMafiaDraft-Win*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ClassicMafiaDraft-Win*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}