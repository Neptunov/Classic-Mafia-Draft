name: Compile Standalone Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Executables
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86] 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React Client
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Download Portable Node Binary
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" == "x64" ]; then
            curl -o node.exe https://nodejs.org/dist/v20.11.1/win-x64/node.exe
          else
            curl -o node.exe https://nodejs.org/dist/v20.11.1/win-x86/node.exe
          fi

      - name: Package Portable App
        shell: pwsh
        run: |
          npm install -g javascript-obfuscator
          
          mkdir Release
          Move-Item node.exe Release/
          
          javascript-obfuscator server --output Release/server --target node
          
          Copy-Item server/package.json Release/server/
          Copy-Item -Recurse server/node_modules Release/server/
          
          New-Item -ItemType Directory -Path Release/client
          Move-Item client/dist Release/client/dist
          
          Compress-Archive -Path Release/* -DestinationPath ClassicMafiaDraft-Win${{ matrix.arch == 'x64' && '64' || '86' }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassicMafiaDraft-Win${{ matrix.arch == 'x64' && '64' || '86' }}
          path: ClassicMafiaDraft-Win*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ClassicMafiaDraft-Win*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}